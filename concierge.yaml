juju:
  channel: 3.6/stable
  model-defaults:
    test-mode: "true"
    automatically-retry-hooks: "false"

providers:
  microk8s:
    enable: true
    bootstrap: true
    channel: latest/stable
    bootstrap-constraints:
      mem: "4G"
      root-disk: "10G"
    addons:
      - dns
      - storage
      - rbac
      - registry
