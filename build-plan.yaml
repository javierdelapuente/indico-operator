version: 1

extra_prepull_images:
  - ghcr.io/canonical/charmed-postgresql:14.22-22.04_edge
  - ghcr.io/canonical/charmed-redis:7.2.5-22.04-edge

rocks:
  - name: indico
    source: indico_rock
  - name: indico-nginx
    source: nginx_rock

charms:
  - name: indico
    source: .
    extra_pytest_args:
      - "--ignore=tests/integration/test_saml.py"
      - "--ignore=tests/unit_harness"
    resources:
      indico-image:
        type: oci-image
        rock: indico
      indico-nginx-image:
        type: oci-image
        rock: indico-nginx
