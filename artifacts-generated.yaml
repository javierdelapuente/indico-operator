version: 1
rocks:
- name: indico
  rockcraft-yaml: indico_rock/rockcraft.yaml
  output:
    file: ./indico_rock/indico_1.0_amd64.rock
- name: indico-nginx
  rockcraft-yaml: nginx_rock/rockcraft.yaml
  output:
    file: ./nginx_rock/indico-nginx_2.0_amd64.rock
charms:
- name: indico
  charmcraft-yaml: charmcraft.yaml
  output:
    files:
    - path: ./indico_ubuntu-20.04-amd64.charm
      base: ubuntu@20.04
  resources:
    indico-image:
      type: oci-image
      rock: indico
    indico-nginx-image:
      type: oci-image
      rock: indico-nginx
snaps: []
